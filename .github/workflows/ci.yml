name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: sudo apt-get update && sudo apt-get install -y tesseract-ocr tesseract-ocr-vie
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - name: Run backend tests
        run: |
          set +e
          PYTHONPATH=. python -m pytest -q > pytest.log 2>&1
          status=$?
          cat pytest.log
          if [ $status -ne 0 ]; then
            msg=$(tail -c 12000 pytest.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')
            echo "::error file=backend/pytest.log,line=1::${msg}"
            exit $status
          fi

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
