services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: mongodb://mongodb:27017
      DATABASE_NAME: cv_match_platform
      JWT_SECRET_KEY: local_dev_secret_change_me
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      FRONTEND_URL: http://localhost:5173
      UPLOAD_DIR: uploads
    depends_on:
      - mongodb
  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
volumes:
  mongo_data:
